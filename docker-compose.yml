services:
  mongodb:
    image: mongo:7
    container_name: agent-memory-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  chroma:
    image: chromadb/chroma:latest
    container_name: agent-memory-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-memory-app
    environment:
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://mongodb:27017}
      DB_NAME: ${DB_NAME:-agent_memory}
      CHROMA_ENABLED: ${CHROMA_ENABLED:-true}
      CHROMA_HOST: ${DOCKER_CHROMA_HOST:-chroma}
      CHROMA_PORT: ${DOCKER_CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-memory_bge_m3_v1}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-dragonkue/BGE-m3-ko}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_CACHE_DIR: ${DOCKER_EMBEDDING_CACHE_DIR:-/app/.cache/models}
      EMBEDDING_MAX_CHARS: ${EMBEDDING_MAX_CHARS:-1200}
      PRELOAD_EMBEDDING_MODEL: ${PRELOAD_EMBEDDING_MODEL:-false}
      CENTROID_STALE_DAYS: ${CENTROID_STALE_DAYS:-14}
      SIMILARITY_WEIGHT: ${SIMILARITY_WEIGHT:-15.0}
    depends_on:
      - mongodb
      - chroma
    working_dir: /app
    volumes:
      - model_cache:/app/.cache/models
    command: python -m src.server

  mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-memory-mcp-http
    restart: unless-stopped
    environment:
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://mongodb:27017}
      DB_NAME: ${DB_NAME:-agent_memory}
      CHROMA_ENABLED: ${CHROMA_ENABLED:-true}
      CHROMA_HOST: ${DOCKER_CHROMA_HOST:-chroma}
      CHROMA_PORT: ${DOCKER_CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-memory_bge_m3_v1}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-dragonkue/BGE-m3-ko}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_CACHE_DIR: ${DOCKER_EMBEDDING_CACHE_DIR:-/app/.cache/models}
      EMBEDDING_MAX_CHARS: ${EMBEDDING_MAX_CHARS:-1200}
      PRELOAD_EMBEDDING_MODEL: ${PRELOAD_EMBEDDING_MODEL:-false}
      CENTROID_STALE_DAYS: ${CENTROID_STALE_DAYS:-14}
      SIMILARITY_WEIGHT: ${SIMILARITY_WEIGHT:-15.0}
      MCP_TRANSPORT: streamable-http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-8002}
      MCP_HTTP_PATH: ${MCP_HTTP_PATH:-/mcp}
    depends_on:
      - mongodb
      - chroma
    working_dir: /app
    volumes:
      - model_cache:/app/.cache/models
    ports:
      - "${MCP_HTTP_PORT:-8002}:${MCP_HTTP_PORT:-8002}"
    command: python -m src.server

volumes:
  mongo_data:
  chroma_data:
  model_cache:
